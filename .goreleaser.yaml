version: 2

project_name: yeoul

release:
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  mode: keep-existing

checksum:
  name_template: "checksums_{{ .Env.RELEASE_TARGET }}.txt"

builds:
  - id: yeoul-linux-amd64
    main: ./cmd/yeoul
    binary: bin/yeoul
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: "{{ if or (ne .Runtime.Goos \"linux\") (ne .Runtime.Goarch \"amd64\") }}true{{ else }}false{{ end }}"
    hooks:
      post:
        - cmd: ./scripts/ci/stage-runtime.sh "{{ .Os }}" "{{ .Arch }}" "{{ .Path }}"
  - id: yeould-linux-amd64
    main: ./cmd/yeould
    binary: bin/yeould
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
