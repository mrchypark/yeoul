      - yeoul-windows-amd64
      - yeould-windows-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [zip]
    wrap_in_directory: true
    files:
      - src: dist/runtime/{{ .Os }}_{{ .Arch }}/bin/*
        dst: bin
        strip_parent: true
