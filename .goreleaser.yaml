archives:
  - id: archive-linux-amd64
    ids:
      - yeoul-linux-amd64
      - yeould-linux-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    wrap_in_directory: true
    files:
      - src: dist/runtime/{{ .Os }}_{{ .Arch }}/lib/*
        dst: lib
        strip_parent: true
  - id: archive-linux-arm64
    ids:
      - yeoul-linux-arm64
      - yeould-linux-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    wrap_in_directory: true
    files:
      - src: dist/runtime/{{ .Os }}_{{ .Arch }}/lib/*
        dst: lib
        strip_parent: true
  - id: archive-darwin-amd64
    ids:
      - yeoul-darwin-amd64
