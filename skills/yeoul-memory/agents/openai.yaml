schema_version: "1"
display_name: "Yeoul Memory"
short_description: "Use Yeoul CLI and memory rules safely in this repo."
default_prompt: "Use Yeoul proactively: prefer the user-level database at $HOME/.local/share/yeoul/work-memory.lbug for normal work, search before recommendations or status interpretation when prior context may matter, search before non-trivial work when prior memory may change the plan, record durable outcomes when they become clear, preserve provenance and lifecycle semantics, say briefly what prior context changed, and prefer CLI workflows over raw storage queries."
